<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old CRT TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

/* ===== MENU ===== */
#menu {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #ccc;
  z-index: 50;
}

#menu h1 {
  font-size: 60px;
  margin-bottom: 30px;
}

.menuText {
  margin: 10px;
  cursor: pointer;
  opacity: 0.7;
}
.menuText:hover { opacity: 1; }

/* ===== CRT ===== */
#crt {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 0;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: contrast(1.2) brightness(1.05) saturate(0.85);
}

/* CRT effects */
#overlay, #scanlines, #flicker {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

#overlay {
  z-index: 3;
  background: radial-gradient(circle, rgba(255,255,255,0.05), rgba(0,0,0,0.85));
  mix-blend-mode: overlay;
  opacity: 0.6;
}

#scanlines {
  z-index: 2;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04),
    rgba(0,0,0,0.04) 2px
  );
  opacity: 0.6;
}

#flicker {
  z-index: 2;
  background: black;
  opacity: 0.05;
  animation: flick 0.12s infinite;
}

@keyframes flick {
  0% { opacity: 0.03; }
  50% { opacity: 0.07; }
  100% { opacity: 0.04; }
}

/* STATIC */
#staticCanvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* ===== BLACK & WHITE ===== */
body.bw video {
  filter: grayscale(1) contrast(2) brightness(1.1) !important;
}

/* CONTROLS */
#controls {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: none;
}

button {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}
button:hover {
  background: white;
  color: black;
}

/* PAUSE */
#pauseScreen {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 30;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 40px;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>OLD TV</h1>

  <div class="menuText" onclick="document.getElementById('fileInput').click()">
    SELECT VIDEO
  </div>

  <!-- B/W IN MENU -->
  <div class="menuText">
    <label>
      <input type="checkbox" id="bwToggle"> BLACK & WHITE
    </label>
  </div>

  <div class="menuText">
    <label>
      <input type="checkbox" id="soundToggle"> OLD TV SOUND
    </label>
  </div>

  <input type="file" id="fileInput" accept="video/*" hidden>
</div>

<!-- CRT -->
<div id="crt">
  <video id="video"></video>
</div>

<div id="overlay"></div>
<div id="scanlines"></div>
<div id="flicker"></div>
<canvas id="staticCanvas"></canvas>

<!-- PAUSE -->
<div id="pauseScreen">PAUSED<br><small>CLICK TO RESUME</small></div>

<!-- SOUND -->
<audio id="tvSound" loop src="old-tv-hum.mp3"></audio>

<script>

const menu = document.getElementById("menu");
const crt = document.getElementById("crt");
const video = document.getElementById("video");
const fileInput = document.getElementById("fileInput");

const bwToggle = document.getElementById("bwToggle");
const soundToggle = document.getElementById("soundToggle");

const pauseScreen = document.getElementById("pauseScreen");
const audio = document.getElementById("tvSound");

/* LOAD VIDEO */
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  video.src = url;

  menu.style.display = "none";
  crt.style.display = "block";

  video.play();

  if(soundToggle.checked){
    audio.play();
  }

  applyBW(); // IMPORTANT: keep setting
});

/* APPLY B/W */
function applyBW() {
  if (bwToggle.checked) {
    document.body.classList.add("bw");
  } else {
    document.body.classList.remove("bw");
  }
}

bwToggle.addEventListener("change", applyBW);

/* PAUSE / RESUME */
video.addEventListener("pause", () => {
  pauseScreen.style.display = "flex";
});

video.addEventListener("play", () => {
  pauseScreen.style.display = "none";
});

pauseScreen.addEventListener("click", () => {
  video.play();
});

video.addEventListener("click", () => {
  video.pause();
});

/* STATIC */
const canvas = document.getElementById("staticCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function noise(){
  const img = ctx.createImageData(canvas.width, canvas.height);
  const d = img.data;

  for(let i=0;i<d.length;i+=4){
    const v = Math.random()*255;
    d[i]=d[i+1]=d[i+2]=v;
    d[i+3]=25;
  }

  ctx.putImageData(img,0,0);
  requestAnimationFrame(noise);
}
noise();

</script>

</body>
</html>
