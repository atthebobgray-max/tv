<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old CRT TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

/* ===== MENU ===== */
#menu {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #ccc;
  z-index: 20;
}

#menu h1 {
  font-size: 60px;
  margin-bottom: 30px;
  letter-spacing: 4px;
}

.menuText {
  margin: 10px;
  cursor: pointer;
  opacity: 0.7;
}
.menuText:hover {
  opacity: 1;
}

/* ===== CRT TV ===== */
#crt {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 0;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: contrast(1.2) brightness(1.05) saturate(0.85);
}

/* overlays */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.05), rgba(0,0,0,0.85));
  mix-blend-mode: overlay;
  opacity: 0.6;
}

#scanlines {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04),
    rgba(0,0,0,0.04) 2px
  );
  opacity: 0.6;
}

#flicker {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: black;
  opacity: 0.05;
  animation: flick 0.12s infinite;
}

@keyframes flick {
  0% { opacity: 0.03; }
  50% { opacity: 0.07; }
  100% { opacity: 0.04; }
}

/* static */
#staticCanvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* B/W */
body.bw video {
  filter: grayscale(1) contrast(2) brightness(1.1) !important;
}

/* controls */
#controls {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: none;
}

button {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}
button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>OLD TV</h1>

  <div class="menuText" onclick="document.getElementById('fileInput').click()">
    SELECT VIDEO
  </div>

  <div class="menuText">
    <label>
      <input type="checkbox" id="soundToggle"> OLD TV SOUND
    </label>
  </div>

  <input type="file" id="fileInput" accept="video/*" hidden>
</div>

<!-- CRT -->
<div id="crt">
  <video id="video" autoplay></video>
</div>

<div id="overlay"></div>
<div id="scanlines"></div>
<div id="flicker"></div>
<canvas id="staticCanvas"></canvas>

<!-- CONTROLS -->
<div id="controls">
  <button id="bwBtn">B/W</button>
  <button id="rewindBtn">REWIND</button>
</div>

<!-- SOUND -->
<audio id="tvSound" loop src="old-tv-hum.mp3"></audio>

<script>

/* ===== ELEMENTS ===== */
const menu = document.getElementById("menu");
const crt = document.getElementById("crt");
const video = document.getElementById("video");
const fileInput = document.getElementById("fileInput");
const controls = document.getElementById("controls");
const audio = document.getElementById("tvSound");
const soundToggle = document.getElementById("soundToggle");

/* ===== LOAD VIDEO ===== */
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  video.src = url;

  menu.style.display = "none";
  crt.style.display = "block";
  controls.style.display = "block";

  video.play();

  if(soundToggle.checked){
    audio.play();
  }
});

/* ===== STATIC ===== */
const canvas = document.getElementById("staticCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function noise(){
  const img = ctx.createImageData(canvas.width, canvas.height);
  const d = img.data;

  for(let i=0;i<d.length;i+=4){
    const v = Math.random()*255;
    d[i]=d[i+1]=d[i+2]=v;
    d[i+3]=30;
  }

  ctx.putImageData(img,0,0);
  requestAnimationFrame(noise);
}
noise();

/* ===== B/W TOGGLE ===== */
document.getElementById("bwBtn").onclick = () => {
  document.body.classList.toggle("bw");
};

/* ===== REWIND (hold) ===== */
let rewindInterval = null;
const rewindBtn = document.getElementById("rewindBtn");

function startRewind() {
  video.pause();
  rewindInterval = setInterval(() => {
    if (video.currentTime > 0.1) {
      video.currentTime -= 0.15;
    } else {
      video.currentTime = 0;
    }
  }, 30);
}

function stopRewind() {
  clearInterval(rewindInterval);
  rewindInterval = null;
  video.play();
}

rewindBtn.addEventListener("mousedown", startRewind);
rewindBtn.addEventListener("mouseup", stopRewind);
rewindBtn.addEventListener("mouseleave", stopRewind);
rewindBtn.addEventListener("touchstart", startRewind);
rewindBtn.addEventListener("touchend", stopRewind);

/* ===== OLD TV SOUND ===== */
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctxAudio = new AudioContext();
const source = ctxAudio.createMediaElementSource(audio);

const lowpass = ctxAudio.createBiquadFilter();
lowpass.type = "lowpass";
lowpass.frequency.value = 700;

const distortion = ctxAudio.createWaveShaper();
distortion.curve = (function(){
  let n = 44100;
  let curve = new Float32Array(n);
  for(let i=0;i<n;i++){
    let x = (i*2)/n - 1;
    curve[i] = Math.tanh(x * 10);
  }
  return curve;
})();

source.connect(lowpass).connect(distortion).connect(ctxAudio.destination);

/* unlock audio */
document.addEventListener("click", () => {
  if(ctxAudio.state === "suspended") ctxAudio.resume();
  audio.play();
}, { once: true });

</script>

</body>
</html>
